<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Módulo 5 · JavaScript Asíncrono - async / await ⏳</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #1f2937);
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .arcade-box {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
    }

    .blink-warning {
      font-size: 2rem;
      font-weight: bold;
      padding: 18px 30px;
      border-radius: 14px;
      animation: parpadear 1s infinite;
      box-shadow: 0 0 20px rgba(255, 193, 7, 0.6);
    }

    @keyframes parpadear {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.35;
        transform: scale(1.03);
      }
    }

    .subtitle {
      color: #f8f9fa;
      margin-top: 20px;
      font-size: 1.1rem;
    }
  </style>
</head>
<body class="bg-dark text-light">

  <div class="container py-5">

    <!-- Bloque arcade original -->
    <div class="arcade-box text-center mb-5">
      <h1 class="text-warning fw-bold mb-4">
        Módulo 5 · JavaScript Asíncrono - async / await ⏳
      </h1>

      <div class="btn btn-warning blink-warning mb-3">
        Debes abrir la consola para ver los resultados de los mini ejercicios.
      </div>

      <p class="subtitle">
        Presiona <strong>F12</strong> y entra en <strong>Console</strong>
        - El resultado del ejercicio final lo puedes ver abajo de este recuadro.
      </p>
    </div>

    <!-- Panel de usuarios -->
    <section class="card bg-secondary bg-opacity-10 border-0">
      <div class="card-body">
        <h2 class="h4 mb-3">Panel de usuarios</h2>

        <div id="barra" class="mb-2"></div>
        <div id="mensajes" class="mb-2 text-warning"></div>

        <button id="btn-recargar" class="btn btn-primary mb-3">
          Recargar
        </button>

        <div id="usuarios" class="row gy-3"></div>
      </div>
    </section>

  </div>

  <script src="mini-ejercicios.js"></script>
  <script src="ejercicio-final.js"></script>
</body>
</html>
